version: "3.8"
services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
    container_name: ultrafeeder
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["8078:8078","8080:80","8754:8754"]
    device_cgroup_rules: ["c 189:* rwm"]
    volumes:
      - /dev/bus/usb:/dev/bus/usb:ro
      - ./ultrafeeder/globe_history:/var/globe_history
      - ./ultrafeeder/autogain:/var/autogain
      - /proc/diskstats:/proc/diskstats:ro
    environment:
      - TZ=America/New_York
      - READSB_LAT=33.6705
      - READSB_LON=-84.3551
      - READSB_ALT=300m
      - READSB_DEVICE_TYPE=rtlsdr
      - READSB_GAIN=auto
      - READSB_NET_ENABLE=true
      - READSB_STATS_RANGE=true
      - UPDATE_TAR1090=true
      - TAR1090_DEFAULTCENTERLAT=33.6705
      - TAR1090_DEFAULTCENTERLON=-84.3551

  fr24feed:
    image: ghcr.io/sdr-enthusiasts/docker-flightradar24:latest
    container_name: fr24feed
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["8755:8754"]
    environment:
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - FR24KEY=
    depends_on: [ultrafeeder]

  piaware:
    image: ghcr.io/sdr-enthusiasts/docker-piaware:latest
    container_name: piaware
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["8081:80"]
    environment:
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - LAT=33.6705
      - LONG=-84.3551
      - TZ=America/New_York
      - FEEDER_ID=
    depends_on: [ultrafeeder]

  rbfeeder:
    image: ghcr.io/sdr-enthusiasts/docker-radarbox:latest
    container_name: rbfeeder
    restart: unless-stopped
    networks: [juicypi-network]
    environment:
      - TZ=America/New_York
      - BEASTHOST=ultrafeeder
      - LAT=33.6705
      - LONG=-84.3551
      - ALT=300
      - SHARING_KEY=
    depends_on: [ultrafeeder]

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["8123:8123"]
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    environment: ["TZ=America/New_York"]

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    networks: [juicypi-network]
    ports: ["9090:9000"]
    volumes:
      - ./mealie/data:/app/data
    environment:
      - TZ=America/New_York
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - BASE_URL=http://192.168.1.73:9090
      - API_PORT=9000

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    networks: [juicypi-network]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--interval","86400","--cleanup"]

networks:
  juicypi-network:
    driver: bridge
