name: Build PDF

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Build PDF
        run: |
          mkdir -p build
          pandoc Juicy-Playbook-v1.0.md \
            --pdf-engine=wkhtmltopdf \
            -o build/Juicy-Playbook-v1.0.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: juicy-playbook-pdf
          path: build/Juicy-Playbook-v1.0.pdf