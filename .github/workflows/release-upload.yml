name: Build & Attach PDF on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc + wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Build PDF
        run: |
          mkdir -p build
          pandoc Juicy-Playbook-v1.0.md \
            --pdf-engine=wkhtmltopdf \
            -o build/Juicy-Playbook-v1.0.pdf

      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Juicy-Playbook-v1.0.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
